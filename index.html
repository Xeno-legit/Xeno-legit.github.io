<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Abdulhamid Ali — Senior Frontend Engineer. Crafting smooth, animated, and performant user interfaces." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Abdulhamid Ali // CRT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=Silkscreen:wght@400;700&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <svg style="position: absolute; pointer-events: none; width: 0; height: 0; overflow: hidden;">
        <filter id="vhs-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" result="noise" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.06" />
            </feComponentTransfer>
            <feBlend mode="screen" in="SourceGraphic" in2="noise" />
        </filter>
    </svg>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
